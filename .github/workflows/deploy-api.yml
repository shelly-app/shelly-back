name: Deploy API

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main-deployment

    steps:
      - uses: actions/checkout@v4

      # Version is read from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build

      - name: Package build artifact
        run: |
          mkdir deploy
          cp package.json pnpm-lock.yaml deploy/
          cp -R dist deploy/
          # Ship the migration SQL + journal. migrate.ts resolves the folder as
          # "./src/db/migrations" relative to the run dir, so preserve that path.
          mkdir -p deploy/src/db
          cp -R src/db/migrations deploy/src/db/
          tar -czf deploy.tar.gz deploy

      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          set -euo pipefail

          echo "==> Writing deploy key"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "==> Scanning host key for $EC2_HOST:$EC2_SSH_PORT"
          # Pin the host key so the connection isn't subject to an interactive
          # prompt. stderr is kept (not sent to /dev/null) so connectivity
          # problems are visible; an empty result means the host is unreachable.
          if ! ssh-keyscan -T 10 -p "$EC2_SSH_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::ssh-keyscan failed — host unreachable on port $EC2_SSH_PORT (check EC2_HOST, EC2_SSH_PORT, and the security group's SSH ingress)."
            exit 1
          fi

          # Fail fast and never prompt: BatchMode disables interactive auth,
          # ConnectTimeout bounds the wait so a closed SG doesn't hang the job.
          ssh_opts="-i $HOME/.ssh/deploy_key -p $EC2_SSH_PORT -o BatchMode=yes -o ConnectTimeout=15"

          # Materialise the production .env from the secret (file transfer, so
          # its contents are never interpolated into a shell command).
          printf '%s\n' "$PROD_ENV" > prod.env

          echo "==> Copying artifact + env to the instance (scp)"
          scp -o BatchMode=yes -o ConnectTimeout=15 -i "$HOME/.ssh/deploy_key" -P "$EC2_SSH_PORT" \
            deploy.tar.gz prod.env "$EC2_USER@$EC2_HOST:/tmp/"

          echo "==> Running remote deployment (ssh)"
          # APP_DIR is injected from the secret; the quoted heredoc keeps the
          # rest of the script from expanding locally.
          ssh $ssh_opts "$EC2_USER@$EC2_HOST" "APP_DIR='$EC2_APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          echo "==> [remote] Extracting artifact"
          rm -rf /tmp/deploy
          tar -xzf /tmp/deploy.tar.gz -C /tmp

          mkdir -p "$APP_DIR"

          echo "==> [remote] Syncing into $APP_DIR"
          # Sync into the app dir. .env is excluded so --delete can't remove it,
          # then refreshed below from the uploaded secret. node_modules is
          # refreshed by the install below.
          rsync -a --delete \
            --exclude='.env' \
            --exclude='node_modules' \
            /tmp/deploy/ "$APP_DIR/"

          install -m 600 /tmp/prod.env "$APP_DIR/.env"

          rm -rf /tmp/deploy /tmp/deploy.tar.gz /tmp/prod.env

          cd "$APP_DIR"

          echo "==> [remote] Provisioning pnpm via corepack"
          # Corepack ships with Node and provisions the pnpm version pinned in
          # package.json's "packageManager" field. Enabling the global shims is
          # best-effort: it can hit EACCES on a system-wide Node install, but
          # `prepare --activate` is what actually makes the pinned pnpm usable.
          corepack enable 2>/dev/null || sudo corepack enable 2>/dev/null || true
          corepack prepare --activate

          echo "==> [remote] Installing production dependencies"
          # --ignore-scripts skips the root "prepare" (husky) lifecycle: husky is
          # a devDependency that isn't present under --prod, and git hooks are
          # irrelevant on the deploy host. None of the prod deps need postinstall.
          pnpm install --prod --frozen-lockfile --ignore-scripts

          echo "==> [remote] Applying database migrations"
          # Run the compiled migrator (drizzle-orm is a prod dep) against the SQL
          # shipped to ./src/db/migrations. Drizzle only applies migrations not
          # already in its journal, so this is a no-op when nothing is new.
          # DB_MIGRATING satisfies the guard in migrate.ts; running before the
          # restart means a failed migration aborts the deploy and leaves the
          # current service untouched.
          DB_MIGRATING=true node --require module-alias/register --env-file=.env dist/db/migrate.js

          echo "==> [remote] Restarting service"
          # systemd owns the process; this picks up the new build.
          sudo systemctl restart shelly-api

          echo "==> [remote] Done"
          REMOTE

