name: Deploy API

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main-deployment

    steps:
      - uses: actions/checkout@v4

      # Version is read from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build

      - name: Package build artifact
        run: |
          mkdir deploy
          cp package.json pnpm-lock.yaml deploy/
          cp -R dist deploy/
          tar -czf deploy.tar.gz deploy

      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          set -euo pipefail

          # Write the private deploy key
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Pin the host key so the connection isn't subject to an interactive prompt
          ssh-keyscan -p "$EC2_SSH_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh_opts="-i $HOME/.ssh/deploy_key -p $EC2_SSH_PORT"

          # Materialise the production .env from the secret (file transfer, so
          # its contents are never interpolated into a shell command).
          printf '%s\n' "$PROD_ENV" > prod.env

          # Ship the build artifact and the env file
          scp -i "$HOME/.ssh/deploy_key" -P "$EC2_SSH_PORT" \
            deploy.tar.gz prod.env "$EC2_USER@$EC2_HOST:/tmp/"

          # Run the remote deployment. APP_DIR is injected from the secret; the
          # quoted heredoc keeps the rest of the script from expanding locally.
          ssh $ssh_opts "$EC2_USER@$EC2_HOST" "APP_DIR='$EC2_APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          rm -rf /tmp/deploy
          tar -xzf /tmp/deploy.tar.gz -C /tmp

          mkdir -p "$APP_DIR"

          # Sync into the app dir. .env is excluded so --delete can't remove it,
          # then refreshed below from the uploaded secret. node_modules is
          # refreshed by the install below.
          rsync -a --delete \
            --exclude='.env' \
            --exclude='node_modules' \
            /tmp/deploy/ "$APP_DIR/"

          install -m 600 /tmp/prod.env "$APP_DIR/.env"

          rm -rf /tmp/deploy /tmp/deploy.tar.gz /tmp/prod.env

          cd "$APP_DIR"
          # Corepack ships with Node and provisions the pnpm version pinned in
          # package.json's "packageManager" field.
          corepack enable
          corepack prepare --activate
          pnpm install --prod --frozen-lockfile

          # systemd owns the process; this picks up the new build.
          sudo systemctl restart shelly-api
          REMOTE

